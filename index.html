<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pixel Legend</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Assistant', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      touch-action: none;
    }

    /* Stars background */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
    }

    /* ===== LANDING PAGE ===== */
    #landing {
      position: relative;
      z-index: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .studio-label {
      font-size: .75rem;
      color: #6b7280;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    #landing h1 {
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: .5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 2.5rem;
    }

    .features {
      display: flex;
      gap: .75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .feature {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: .65rem 1.1rem;
      font-size: .85rem;
      color: #c4b5fd;
    }

    #start-btn {
      background: linear-gradient(135deg, #7c3aed, #0891b2);
      border: none;
      color: #fff;
      font-family: 'Assistant', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 1rem 3rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(124,58,237,.55);
      transition: transform .15s, box-shadow .15s;
    }
    #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(124,58,237,.75); }
    #start-btn:active { transform: scale(.97); }

    .player-count { margin-top: 1.5rem; font-size: .75rem; color: #374151; }

    /* ===== PRANK OVERLAY ===== */
    #prank-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      touch-action: none;
    }
    #prank-overlay.show { display: flex; }

    .prank-emoji {
      font-size: clamp(3rem, 12vw, 5rem);
      margin-bottom: 1rem;
      animation: bounce 1s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    .prank-text {
      font-size: clamp(1.3rem, 6vw, 1.8rem);
      font-weight: 900;
      color: #f472b6;
      margin-bottom: .5rem;
      line-height: 1.3;
    }

    .prank-sub {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    .locked-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: .4rem .9rem;
      font-size: .8rem;
      color: #9ca3af;
      margin-bottom: 1.25rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    #timer-display {
      font-size: clamp(3.5rem, 16vw, 6rem);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      line-height: 1;
      margin-bottom: .5rem;
    }

    .timer-label {
      font-size: .8rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1.75rem;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 340px;
      height: 6px;
      background: #1f2937;
      border-radius: 3px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #7c3aed, #ef4444);
      transition: width .8s linear;
    }

    #exit-btn {
      display: none;
      background: linear-gradient(135deg, #059669, #0284c7);
      border: none;
      color: #fff;
      font-family: 'Assistant', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      padding: .9rem 2.5rem;
      border-radius: 50px;
      cursor: pointer;
      animation: fadeUp .5s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Landing Page -->
  <div id="landing">
    <div class="studio-label">⚡ Pixel Studios</div>
    <h1>Pixel Legend</h1>
    <div class="subtitle">משחק האקשן הכי ממכר של 2025</div>
    <div class="features">
      <div class="feature">🎮 100 שלבים</div>
      <div class="feature">⚔️ PvP חי</div>
      <div class="feature">🏆 לידרבורד</div>
    </div>
    <button id="start-btn" onclick="startPrank()">▶ התחל לשחק</button>
    <div class="player-count">משוחק על ידי 2,847,291 שחקנים היום</div>
  </div>

  <!-- Prank Overlay -->
  <div id="prank-overlay">
    <div class="prank-emoji">😂</div>
    <div class="prank-text">חחחחח אחד באפריל!</div>
    <div class="prank-sub">אף פעם אל תסמכו על אתרים שלי 😇</div>
    <div class="locked-badge" id="locked-badge"><div class="dot"></div> נעול למשך...</div>
    <div id="timer-display">10:00</div>
    <div class="timer-label" id="timer-label">עד לשחרור</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress" style="width:100%"></div>
    </div>
    <button id="exit-btn" onclick="exitPrank()">🎉 לחץ כאן ליציאה</button>
  </div>

  <script>
    /* ── Stars ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left    = Math.random() * 100 + '%';
      s.style.top     = Math.random() * 100 + '%';
      s.style.opacity = (Math.random() * .5 + .1).toFixed(2);
      starsEl.appendChild(s);
    }

    /* ── Timer ── */
    const TOTAL = 600;
    let remaining = TOTAL;
    let timerInterval = null;
    let prankActive = false;

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateDisplay() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      document.getElementById('timer-display').textContent = pad(m) + ':' + pad(s);
      document.getElementById('progress').style.width = (remaining / TOTAL * 100) + '%';
    }

    /* ── Start Prank ── */
    function startPrank() {
      if (prankActive) return;
      prankActive = true;

      document.getElementById('landing').style.display = 'none';
      document.getElementById('prank-overlay').classList.add('show');

      /* Fullscreen */
      const el = document.documentElement;
      if (el.requestFullscreen)              el.requestFullscreen().catch(() => {});
      else if (el.webkitRequestFullscreen)   el.webkitRequestFullscreen();

      /* Block back button – push 60 states so every "back" tap stays here */
      for (let i = 0; i < 60; i++) history.pushState(null, '', location.href);
      window.addEventListener('popstate', () => {
        history.pushState(null, '', location.href);
      });

      /* Warn on tab close */
      window.onbeforeunload = (e) => {
        if (remaining > 0) {
          e.preventDefault();
          e.returnValue = 'האם אתה בטוח שברצונך לצאת?';
          return e.returnValue;
        }
      };

      /* Countdown */
      timerInterval = setInterval(() => {
        remaining--;
        updateDisplay();
        if (remaining <= 0) {
          clearInterval(timerInterval);
          remaining = 0;
          updateDisplay();
          window.onbeforeunload = null;
          document.getElementById('exit-btn').style.display = 'block';
          document.getElementById('locked-badge').innerHTML  = '🎉 הזמן הסתיים!';
          document.getElementById('timer-label').textContent = 'חופשי!';
        }
      }, 1000);

      updateDisplay();
    }

    /* ── Exit Prank ── */
    function exitPrank() {
      window.onbeforeunload = null;
      clearInterval(timerInterval);
      prankActive = false;
      remaining = TOTAL;

      document.getElementById('prank-overlay').classList.remove('show');
      document.getElementById('exit-btn').style.display = 'none';
      document.getElementById('landing').style.display  = 'flex';
      document.getElementById('locked-badge').innerHTML = '<div class="dot"></div> נעול למשך...';
      document.getElementById('timer-label').textContent = 'עד לשחרור';
      updateDisplay();

      if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
    }
  </script>
</body>
</html>
